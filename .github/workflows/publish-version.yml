name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  detect-version:
    name: Detect Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect latest version from changelog
        uses: hawk-digital-environments/hawk-pipeline-actions/detect-version@v1
        id: version
        with:
          strategy: 'changelog'

  build-and-publish:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: [ detect-version ]
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            digitalenvironments/hawki-toolkit-file-converter:latest
            digitalenvironments/hawki-toolkit-file-converter:${{ needs.detect-version.outputs.version }}
          cache-from: type=gha,scope=${{ needs.detect-version.outputs.version }}
          cache-to: type=gha,mode=max,scope=${{ needs.detect-version.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: index.docker.io/digitalenvironments/hawki-toolkit-file-converter
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-and-publish ]
    permissions:
      contents: write
    outputs:
      release-name: ${{ steps.release.outputs.release-name }}
      release-body: ${{ steps.release.outputs.release-body }}
      release-url: ${{ steps.release.outputs.release-url }}
    steps:
      - uses: actions/checkout@v6

      - id: release
        uses: hawk-digital-environments/hawk-pipeline-actions/create-github-release@v1
        with:
          version: ${{ needs.detect-version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ build-and-publish, github-release ]
    if: success()
    steps:
      - uses: actions/checkout@v6

      - uses: hawk-digital-environments/hawk-pipeline-actions/send-discord-notification@v1
        with:
          webhook-url: ${{ secrets.DISCORD_UPDATE_WEBHOOK_URL }}
          release-name: ${{ needs.github-release.outputs.release-name }}
          release-body: ${{ needs.github-release.outputs.release-body }}
          release-url: ${{ needs.github-release.outputs.release-url }}
          content: "||@everyone|| Beware! a new **HAWKI File Converter** version just dropped **${{ needs.detect-version.outputs.version }}**!"
