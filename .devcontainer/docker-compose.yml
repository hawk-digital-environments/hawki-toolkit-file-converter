services:
  file-converter:
    build:
      context: ..
      dockerfile: Dockerfile
      target: development
      args:
        USERNAME: ${USER:-dev}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    volumes:
      - ..:/workspace
    user: "0:0"
    environment:
      - F_API_KEY=${F_API_KEY:-dev}
    command: sleep infinity
