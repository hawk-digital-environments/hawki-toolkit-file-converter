[program:temporal-worker]
command=bash -c 'while ! echo > /dev/tcp/127.0.0.1/7233 2>/dev/null; do sleep 1; done; exec python task.py'
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
priority=30
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
