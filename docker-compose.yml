networks:
  hawki-network:
    driver: bridge

services:
  file-converter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:80"
    environment:
      - F_API_KEY= ${F_API_KEY:-} # Empty by default
    restart: unless-stopped

  file-converter-worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "workers.file_conversion_worker"]
    environment:
      - COMMUNICATION_ENABLED=${COMMUNICATION_ENABLED:-true}
      - COMMUNICATION_METHOD=${COMMUNICATION_METHOD:-rabbitmq}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - RABBITMQ_HEARTBEAT=${RABBITMQ_HEARTBEAT:-30}
      - RABBITMQ_CONNECTION_TIMEOUT=${RABBITMQ_CONNECTION_TIMEOUT:-30}
      - RABBITMQ_EVENTS_EXCHANGE=${RABBITMQ_EVENTS_EXCHANGE:-pipeline.events}
      - RABBITMQ_EVENTS_EXCHANGE_TYPE=${RABBITMQ_EVENTS_EXCHANGE_TYPE:-direct}
      - RABBITMQ_RETRY_EXCHANGE=${RABBITMQ_RETRY_EXCHANGE:-pipeline.retry}
      - RABBITMQ_RETRY_EXCHANGE_TYPE=${RABBITMQ_RETRY_EXCHANGE_TYPE:-direct}
      - RABBITMQ_FAILED_EXCHANGE=${RABBITMQ_FAILED_EXCHANGE:-pipeline.failed}
      - RABBITMQ_FAILED_EXCHANGE_TYPE=${RABBITMQ_FAILED_EXCHANGE_TYPE:-direct}
      - RABBITMQ_FILE_CONVERSION_QUEUE=${RABBITMQ_FILE_CONVERSION_QUEUE:-file_conversion_jobs}
      - RABBITMQ_FILE_DISCOVERED_ROUTING_KEY=${RABBITMQ_FILE_DISCOVERED_ROUTING_KEY:-scrape.file.discovered}
      - RABBITMQ_FILE_CONVERSION_RETRY_QUEUE=${RABBITMQ_FILE_CONVERSION_RETRY_QUEUE:-file_conversion_jobs_retry}
      - RABBITMQ_FILE_CONVERSION_RETRY_ROUTING_KEY=${RABBITMQ_FILE_CONVERSION_RETRY_ROUTING_KEY:-scrape.file.discovered.retry}
      - RABBITMQ_DOCUMENT_CONVERTED_ROUTING_KEY=${RABBITMQ_DOCUMENT_CONVERTED_ROUTING_KEY:-convert.document.completed}
      - RABBITMQ_FAILED_QUEUE=${RABBITMQ_FAILED_QUEUE:-failed_jobs}
      - RABBITMQ_FAILED_ROUTING_KEY=${RABBITMQ_FAILED_ROUTING_KEY:-pipeline.failed}
      - RABBITMQ_RETRY_DELAY_MS=${RABBITMQ_RETRY_DELAY_MS:-5000}
      - RABBITMQ_PREFETCH_COUNT=${RABBITMQ_PREFETCH_COUNT:-1}
      - RABBITMQ_MAX_RETRIES=${RABBITMQ_MAX_RETRIES:-3}
      - RABBITMQ_QUEUE_TYPE=${RABBITMQ_QUEUE_TYPE:-quorum}
      - RABBITMQ_PUBLISHER_CONFIRMS=${RABBITMQ_PUBLISHER_CONFIRMS:-true}
      - RABBITMQ_PERSISTENT_MESSAGES=${RABBITMQ_PERSISTENT_MESSAGES:-true}
      - JOB_SCHEMA_VERSION=${JOB_SCHEMA_VERSION:-1}
      - SERVICE_NAME=${SERVICE_NAME:-file-converter}
      - SHARED_STORAGE_ROOT=${SHARED_STORAGE_ROOT:-/app/shared}
      - CONVERTED_OUTPUT_ROOT=${CONVERTED_OUTPUT_ROOT:-/app/shared/converted}
    volumes:
      - ${SHARED_STORAGE_HOST_PATH:-./shared}:/app/shared
    restart: unless-stopped
